<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Regression Test Harness</title>
    <style>
        :root {
            --bg: #f3f6fb;
            --surface: #ffffff;
            --border: #dbe3ef;
            --heading: #0f172a;
            --text: #1f2937;
            --muted: #64748b;
            --input-bg: #ffffff;
            --input-border: #cbd5e1;
            --focus: #3b82f6;
            --button-bg: #1d4ed8;
            --button-hover: #1e40af;
            --error-bg: #fff1f2;
            --error-border: #fecdd3;
            --error-text: #b91c1c;
        }
        html[data-theme="dark"] {
            --bg: #0b1220;
            --surface: #111827;
            --border: #334155;
            --heading: #f8fafc;
            --text: #dbe4f0;
            --muted: #93a4bc;
            --input-bg: #0b1220;
            --input-border: #334155;
            --focus: #60a5fa;
            --button-bg: #2563eb;
            --button-hover: #1d4ed8;
            --error-bg: #3b1212;
            --error-border: #7f1d1d;
            --error-text: #fecaca;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at top right, rgba(37, 99, 235, 0.08), transparent 35%), var(--bg);
            color: var(--text);
            padding: 1rem;
            box-sizing: border-box;
        }
        .card {
            width: min(420px, 100%);
            border: 1px solid var(--border);
            border-radius: 14px;
            background: var(--surface);
            padding: 1.2rem 1.1rem 1.05rem;
            box-sizing: border-box;
        }
        h1 {
            margin: 0 0 0.35rem 0;
            font-size: 1.35rem;
            color: var(--heading);
        }
        p {
            margin: 0 0 0.95rem 0;
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.4;
        }
        .field {
            margin-bottom: 0.85rem;
        }
        label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--heading);
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            box-sizing: border-box;
            padding: 0.62rem;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            background: var(--input-bg);
            color: var(--text);
            font-size: 0.95rem;
        }
        input:focus-visible {
            outline: 2px solid var(--focus);
            outline-offset: 1px;
        }
        .actions {
            margin-top: 0.95rem;
            display: flex;
            justify-content: flex-end;
        }
        button {
            border: none;
            border-radius: 8px;
            padding: 0.68rem 1.08rem;
            font-size: 0.92rem;
            font-weight: 700;
            color: #fff;
            background: var(--button-bg);
            cursor: pointer;
        }
        button:hover {
            background: var(--button-hover);
        }
        .flash {
            margin-bottom: 0.8rem;
            border: 1px solid var(--error-border);
            background: var(--error-bg);
            color: var(--error-text);
            border-radius: 8px;
            padding: 0.55rem 0.65rem;
            font-size: 0.88rem;
        }
    </style>
    <script>
        (function() {
            var key = 'rth_theme_preference';
            var theme = 'light';
            try {
                var saved = window.localStorage.getItem(key);
                if (saved === 'light' || saved === 'dark') {
                    theme = saved;
                } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    theme = 'dark';
                }
            } catch (error) {
                theme = 'light';
            }
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
    <main class="card">
        <h1>Regression Test Harness</h1>
        <p>Sign in to access this harness session.</p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
            <div class="flash">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="post" action="/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="hidden" name="next" value="{{ next_path }}">

            <div class="field">
                <label for="username">Username</label>
                <input id="username" type="text" name="username" value="" {% if username_hint %}placeholder="{{ username_hint }}"{% endif %} autocomplete="username" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input id="password" type="password" name="password" value="" autocomplete="current-password" required>
            </div>
            <div class="actions">
                <button type="submit">Sign In</button>
            </div>
        </form>
    </main>
</body>
</html>
